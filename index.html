<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘用户 | 个人主页</title>
    <!-- 依赖库 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0D47A1',
                        secondary: '#546E7A',
                        accent: '#2196F3',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            /* 高端轻奢玻璃卡片 */
            .card-luxury {
                @apply bg-white/90 dark:bg-slate-900/90 backdrop-blur-2xl rounded-2xl shadow-xl border border-white/20 dark:border-slate-700/30;
            }
            /* 优雅悬浮动效 */
            .hover-luxury {
                transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            }
            .hover-luxury:hover {
                transform: translateY(-6px);
                box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            }
            /* 头像光晕特效 */
            .avatar-glow {
                box-shadow: 0 0 30px rgba(33, 150, 243, 0.25);
            }
            .dark .avatar-glow {
                box-shadow: 0 0 30px rgba(33, 150, 243, 0.35);
            }
            /* 动态渐变背景 */
            .bg-gradient-luxury {
                background: linear-gradient(-45deg, #F8FAFC, #E2E8F0, #F1F5F9, #DEE5ED);
                background-size: 400% 400%;
                animation: gradient 18s ease infinite;
            }
            .dark .bg-gradient-luxury {
                background: linear-gradient(-45deg, #0F172A, #1E293B, #273444, #1E293B);
            }
            @keyframes gradient {
                0% { background-position: 0% 50%; }
                50% { background-position: 100% 50%; }
                100% { background-position: 0% 50%; }
            }
            /* 精致分割线 */
            .divider {
                @apply h-px w-16 bg-gradient-to-r from-transparent via-primary/30 to-transparent mx-auto my-4;
            }
        }
    </style>
</head>
<body class="bg-gradient-luxury min-h-screen text-slate-800 dark:text-slate-100 transition-colors duration-500">
    <!-- 主题切换按钮 -->
    <button id="themeToggle" class="fixed top-8 right-8 w-12 h-12 rounded-full bg-white/95 dark:bg-slate-800/95 shadow-lg flex items-center justify-center hover-luxury z-50 border border-slate-200 dark:border-slate-700">
        <i class="fa fa-moon-o dark:hidden text-slate-600 text-lg"></i>
        <i class="fa fa-sun-o hidden dark:block text-amber-400 text-lg"></i>
    </button>

    <!-- 主内容 -->
    <main class="min-h-screen flex flex-col items-center justify-center px-4 py-20">
        <!-- 核心高端卡片 -->
        <div class="card-luxury p-10 md:p-12 w-full max-w-md hover-luxury">
            <!-- 头像区域 -->
            <div class="flex flex-col items-center mb-8">
                <div class="w-36 h-36 rounded-full overflow-hidden border-4 border-white dark:border-slate-700 avatar-glow mb-6">
                    <!-- 本地头像 -->
                    <img src="./TouXiang.jpg" class="w-full h-full object-cover" alt="神秘用户头像">
                </div>
                <h1 class="text-4xl font-bold mb-2 tracking-tight">神秘用户</h1>
                <p class="text-secondary text-base tracking-wider font-light">Digital Creator | Tech Explorer</p>
            </div>

            <!-- 分割线 -->
            <div class="divider"></div>

            <!-- 个人简介 -->
            <div class="text-center mb-8">
                <p class="text-slate-600 dark:text-slate-300 leading-relaxed text-lg">
                    隐匿于数字世界<br>
                    专注创作，简约而不简单
                </p>
            </div>

            <!-- 核心技能模块 -->
            <div class="mb-8">
                <h3 class="text-center text-sm font-semibold text-secondary uppercase tracking-widest mb-4">Core Skills</h3>
                <div class="flex flex-wrap justify-center gap-3">
                    <span class="px-4 py-1.5 rounded-full bg-primary/10 text-primary text-sm font-medium">创意设计</span>
                    <span class="px-4 py-1.5 rounded-full bg-slate-100 dark:bg-slate-800 text-sm">数字创作</span>
                    <span class="px-4 py-1.5 rounded-full bg-primary/10 text-primary text-sm font-medium">技术探索</span>
                    <span class="px-4 py-1.5 rounded-full bg-slate-100 dark:bg-slate-800 text-sm">内容输出</span>
                </div>
            </div>

            <!-- 功能按钮 -->
            <div class="grid grid-cols-2 gap-4 mb-8">
                <a href="#" class="rounded-xl py-3 text-center border border-slate-200 dark:border-slate-700 hover:bg-primary/5 hover:border-primary/30 hover-luxury font-medium">
                    <i class="fa fa-home mr-1"></i>主页
                </a>
                <a href="#" class="rounded-xl py-3 text-center border border-slate-200 dark:border-slate-700 hover:bg-primary/5 hover:border-primary/30 hover-luxury font-medium">
                    <i class="fa fa-th mr-1"></i>作品
                </a>
                <a href="#" class="rounded-xl py-3 text-center border border-slate-200 dark:border-slate-700 hover:bg-primary/5 hover:border-primary/30 hover-luxury font-medium">
                    <i class="fa fa-book mr-1"></i>日志
                </a>
                <a href="#" class="rounded-xl py-3 text-center border border-slate-200 dark:border-slate-700 hover:bg-primary/5 hover:border-primary/30 hover-luxury font-medium">
                    <i class="fa fa-envelope mr-1"></i>联系
                </a>
            </div>

            <!-- 社交链接 -->
            <div class="flex justify-center gap-8 text-2xl">
                <a href="https://github.com/Explore0416" class="text-secondary hover:text-accent hover-luxury"><i class="fa fa-github"></i></a>
                <a href="#" class="text-secondary hover:text-accent hover-luxury"><i class="fa fa-twitter"></i></a>
                <a href="#" class="text-secondary hover:text-accent hover-luxury"><i class="fa fa-weixin"></i></a>
                <a href="#" class="text-secondary hover:text-accent hover-luxury"><i class="fa fa-link"></i></a>
            </div>
        </div>

        <!-- 底部版权 -->
        <footer class="mt-12 text-sm text-slate-500 dark:text-slate-400 font-light">
            © 2025 神秘用户 · All Rights Reserved
        </footer>
    </main>

    <script>
        // 暗黑/浅色主题切换（本地存储记忆）
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        // 读取本地存储的主题
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
        }

        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        });
    </script>
</body>
</html>
