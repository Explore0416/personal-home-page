<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘用户 | 个人主页</title>
    <!-- 依赖库 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0D47A1',
                        secondary: '#546E7A',
                        accent: '#2196F3',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .card-luxury {
                @apply bg-white/90 dark:bg-slate-900/90 backdrop-blur-2xl rounded-2xl shadow-xl border border-white/20 dark:border-slate-700/30;
            }
            .hover-luxury {
                transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            }
            .hover-luxury:hover {
                transform: translateY(-6px);
                box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            }
            .avatar-glow {
                box-shadow: 0 0 30px rgba(33, 150, 243, 0.25);
            }
            .dark .avatar-glow {
                box-shadow: 0 0 30px rgba(33, 150, 243, 0.35);
            }
            .bg-gradient-luxury {
                background: linear-gradient(-45deg, #F8FAFC, #E2E8F0, #F1F5F9, #DEE5ED);
                background-size: 400% 400%;
                animation: gradient 18s ease infinite;
            }
            .dark .bg-gradient-luxury {
                background: linear-gradient(-45deg, #0F172A, #1E293B, #273444, #1E293B);
            }
            @keyframes gradient {
                0% { background-position: 0% 50%; }
                50% { background-position: 100% 50%; }
                100% { background-position: 0% 50%; }
            }
            .divider {
                @apply h-px w-16 bg-gradient-to-r from-transparent via-primary/30 to-transparent mx-auto my-4;
            }
        }
    </style>
</head>
<body class="bg-gradient-luxury min-h-screen text-slate-800 dark:text-slate-100 transition-colors duration-500">

    <!-- 主题切换按钮 -->
    <button id="themeToggle"
            class="fixed top-8 right-8 w-12 h-12 rounded-full bg-white/95 dark:bg-slate-800/95 shadow-lg flex items-center justify-center hover-luxury z-50 border border-slate-200 dark:border-slate-700"
            aria-label="切换暗黑模式">
        <i class="fa fa-moon-o dark:hidden text-slate-600 text-lg"></i>
        <i class="fa fa-sun-o hidden dark:block text-amber-400 text-lg"></i>
    </button>

    <!-- 主内容区域 -->
    <main class="min-h-screen flex flex-col items-center justify-center px-4 py-20">
        <!-- 核心信息卡片 -->
        <div class="card-luxury p-10 md:p-12 w-full max-w-md hover-luxury">
            <!-- 头像与名称 -->
            <header class="flex flex-col items-center mb-8">
                <div class="w-36 h-36 rounded-full overflow-hidden border-4 border-white dark:border-slate-700 avatar-glow mb-6">
                    <img src="./TouXiang.jpg" class="w-full h-full object-cover" alt="神秘用户头像">
                </div>
                <h1 class="text-4xl font-bold mb-2 tracking-tight">神秘用户</h1>
                <p class="text-secondary text-base tracking-wider font-light">Digital Creator | Tech Explorer</p>
            </header>

            <div class="divider"></div>

            <!-- 个人简介 -->
            <section class="text-center mb-8">
                <p class="text-slate-600 dark:text-slate-300 leading-relaxed text-lg">
                    隐匿于数字世界<br>
                    专注创作，简约而不简单
                </p>
            </section>

            <!-- 核心技能 -->
            <section class="mb-8">
                <h2 class="text-center text-sm font-semibold text-secondary uppercase tracking-widest mb-4">Core Skills</h2>
                <div class="flex flex-wrap justify-center gap-3">
                    <span class="px-4 py-1.5 rounded-full bg-primary/10 text-primary text-sm font-medium">创意设计</span>
                    <span class="px-4 py-1.5 rounded-full bg-slate-100 dark:bg-slate-800 text-sm">数字创作</span>
                    <span class="px-4 py-1.5 rounded-full bg-primary/10 text-primary text-sm font-medium">技术探索</span>
                    <span class="px-4 py-1.5 rounded-full bg-slate-100 dark:bg-slate-800 text-sm">内容输出</span>
                </div>
            </section>

            <!-- 功能导航按钮 -->
            <nav class="grid grid-cols-2 gap-4 mb-8" aria-label="功能导航">
                <a href="#" class="rounded-xl py-3 text-center border border-slate-200 dark:border-slate-700 hover:bg-primary/5 hover:border-primary/30 hover-luxury font-medium">
                    <i class="fa fa-home mr-1" aria-hidden="true"></i>主页
                </a>
                <a href="#" class="rounded-xl py-3 text-center border border-slate-200 dark:border-slate-700 hover:bg-primary/5 hover:border-primary/30 hover-luxury font-medium">
                    <i class="fa fa-th mr-1" aria-hidden="true"></i>作品
                </a>
                <a href="#" class="rounded-xl py-3 text-center border border-slate-200 dark:border-slate-700 hover:bg-primary/5 hover:border-primary/30 hover-luxury font-medium">
                    <i class="fa fa-book mr-1" aria-hidden="true"></i>日志
                </a>
                <a href="#" class="rounded-xl py-3 text-center border border-slate-200 dark:border-slate-700 hover:bg-primary/5 hover:border-primary/30 hover-luxury font-medium">
                    <i class="fa fa-envelope mr-1" aria-hidden="true"></i>联系
                </a>
            </nav>

            <!-- 社交链接（微信已替换为邮箱） -->
            <footer class="flex justify-center gap-8 text-2xl" aria-label="社交链接">
                <a href="https://github.com/Explore0416" class="text-secondary hover:text-accent hover-luxury" aria-label="GitHub">
                    <i class="fa fa-github"></i>
                </a>
                <a href="#" class="text-secondary hover:text-accent hover-luxury" aria-label="Twitter">
                    <i class="fa fa-twitter"></i>
                </a>
                <!-- 替换微信为邮箱，mailto 唤起默认邮件客户端 -->
                <a href="mailto:Explore0416@outlook.com" class="text-secondary hover:text-accent hover-luxury" aria-label="发送邮件至 Explore0416@outlook.com">
                    <i class="fa fa-envelope"></i>
                </a>
                <a href="#" class="text-secondary hover:text-accent hover-luxury" aria-label="个人链接">
                    <i class="fa fa-link"></i>
                </a>
            </footer>
        </div>

        <!-- 底部版权信息 -->
        <p class="mt-12 text-sm text-slate-500 dark:text-slate-400 font-light">
            © 2025 神秘用户 · All Rights Reserved
        </p>
    </main>

    <script>
        (function() {
            const html = document.documentElement;
            const themeToggle = document.getElementById('themeToggle');

            // 初始化主题：优先本地存储，其次系统偏好
            const storedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (storedTheme === 'dark' || (!storedTheme && prefersDark)) {
                html.classList.add('dark');
            }

            // 切换主题并存储
            themeToggle.addEventListener('click', () => {
                html.classList.toggle('dark');
                localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
            });
        })();
    </script>
</body>
</html>
