<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘用户 | 个人主页</title>
    <!-- 依赖库 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#64748b',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            /* 极简玻璃卡片 */
            .card {
                @apply bg-white/80 dark:bg-dark/80 backdrop-blur-xl rounded-2xl shadow-lg border border-gray-100 dark:border-gray-800;
            }
            /* 优雅动效 */
            .hover-float {
                transition: all 0.3s ease;
            }
            .hover-float:hover {
                transform: translateY(-3px);
            }
            /* 动态渐变背景 */
            .gradient-bg {
                background: linear-gradient(-45deg, #f8fafc, #e2e8f0, #f1f5f9, #cbd5e1);
                background-size: 400% 400%;
                animation: gradient 15s ease infinite;
            }
            .dark .gradient-bg {
                background: linear-gradient(-45deg, #0f172a, #1e293b, #334155, #0f172a);
            }
            @keyframes gradient {
                0% { background-position: 0% 50%; }
                50% { background-position: 100% 50%; }
                100% { background-position: 0% 50%; }
            }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen text-gray-800 dark:text-gray-100 transition-colors duration-300">
    <!-- 主题切换按钮 -->
    <button id="themeToggle" class="fixed top-6 right-6 w-10 h-10 rounded-full bg-white/90 dark:bg-dark/90 shadow-md flex items-center justify-center hover-float z-50">
        <i class="fa fa-moon-o dark:hidden text-gray-600"></i>
        <i class="fa fa-sun-o hidden dark:block text-yellow-400"></i>
    </button>

    <!-- 主内容 -->
    <main class="min-h-screen flex flex-col items-center justify-center px-4 py-16">
        <!-- 核心卡片 -->
        <div class="card p-8 md:p-10 w-full max-w-md hover-float">
            <!-- 头像区域（已替换为本地图片） -->
            <div class="flex flex-col items-center mb-6">
                <div class="w-28 h-28 rounded-full bg-gray-100 dark:bg-gray-800 mb-5 overflow-hidden border-2 border-primary/20">
                    <!-- 本地头像 核心修改处 -->
                    <img src="./TouXiang.jpg" class="w-full h-full object-cover" alt="神秘用户头像">
                </div>
                <h1 class="text-3xl font-bold mb-1">神秘用户</h1>
                <p class="text-secondary text-sm tracking-wider">Digital Creator | Explorer</p>
            </div>

            <!-- 个人简介 -->
            <div class="text-center mb-6">
                <p class="text-gray-600 dark:text-gray-300 leading-relaxed">
                    隐匿于数字世界<br>
                    专注创作，简约而不简单
                </p>
            </div>

            <!-- 核心技能模块 -->
            <div class="mb-6">
                <h3 class="text-center text-sm font-semibold text-secondary mb-3">核心技能</h3>
                <div class="flex flex-wrap justify-center gap-2">
                    <span class="px-3 py-1 rounded-full bg-primary/10 text-primary text-xs">创意设计</span>
                    <span class="px-3 py-1 rounded-full bg-gray-100 dark:bg-gray-800 text-xs">数字创作</span>
                    <span class="px-3 py-1 rounded-full bg-primary/10 text-primary text-xs">技术探索</span>
                    <span class="px-3 py-1 rounded-full bg-gray-100 dark:bg-gray-800 text-xs">内容输出</span>
                </div>
            </div>

            <!-- 功能按钮 -->
            <div class="grid grid-cols-2 gap-3 mb-6">
                <a href="#" class="rounded-lg py-2.5 text-center border border-gray-200 dark:border-gray-700 hover:bg-primary/5 hover:border-primary/30 hover-float">
                    <i class="fa fa-home mr-1"></i>主页
                </a>
                <a href="#" class="rounded-lg py-2.5 text-center border border-gray-200 dark:border-gray-700 hover:bg-primary/5 hover:border-primary/30 hover-float">
                    <i class="fa fa-th mr-1"></i>作品
                </a>
                <a href="#" class="rounded-lg py-2.5 text-center border border-gray-200 dark:border-gray-700 hover:bg-primary/5 hover:border-primary/30 hover-float">
                    <i class="fa fa-book mr-1"></i>日志
                </a>
                <a href="#" class="rounded-lg py-2.5 text-center border border-gray-200 dark:border-gray-700 hover:bg-primary/5 hover:border-primary/30 hover-float">
                    <i class="fa fa-envelope mr-1"></i>联系
                </a>
            </div>

            <!-- 社交链接 -->
            <div class="flex justify-center gap-6 text-xl mb-2">
                <a href="#" class="text-secondary hover:text-primary hover-float"><i class="fa fa-github"></i></a>
                <a href="#" class="text-secondary hover:text-primary hover-float"><i class="fa fa-twitter"></i></a>
                <a href="#" class="text-secondary hover:text-primary hover-float"><i class="fa fa-weixin"></i></a>
                <a href="#" class="text-secondary hover:text-primary hover-float"><i class="fa fa-link"></i></a>
            </div>
        </div>

        <!-- 底部 -->
        <footer class="mt-8 text-sm text-gray-500 dark:text-gray-400">
            © 2025 神秘用户 · 保留所有权利
        </footer>
    </main>

    <script>
        // 暗黑/浅色主题切换（本地存储记忆）
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        // 读取本地存储的主题
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
        }

        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        });
    </script>
</body>
</html>
